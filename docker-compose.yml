version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dentalmind_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dentalmind
    ports:
      - "5432:5432"
    volumes:
      - dentalmind_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dentalmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: dentalmind_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  dentalmind_pgdata: